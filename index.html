<!DOCTYPE html>
<html>
<head>
<title>Pro Online Exam</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    margin: 0;
}

.container {
    width: 90%;
    max-width: 700px;
    margin: auto;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.option {
    display: block;
    text-align: left;
    padding: 10px;
    margin: 8px 0;
    background: #f0f0f0;
    border-radius: 5px;
    cursor: pointer;
}

.option:hover { background: #ddd; }

.correct { background: lightgreen; }
.wrong { background: #ffb3b3; }

button {
    padding: 10px 20px;
    background: #667eea;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

#navPanel button {
    margin: 3px;
    padding: 5px;
}

#progressBar {
    height: 8px;
    background: green;
    width: 0%;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container" id="app">

<!-- LOGIN -->
<div id="login">
    <h2>Enter Your Name</h2>
    <input type="text" id="username" placeholder="Your Name">
    <br><br>
    <button onclick="startExam()">Start Exam</button>
</div>

</div>
    <script>
let questions = [
{q:"H2O क्या है?",o:["ऑक्सीजन","पानी","हाइड्रोजन","कार्बन डाइऑक्साइड"],a:"पानी"},
{q:"न्यूट्रल घोल का pH मान क्या होता है?",o:["7","1","14","0"],a:"7"},
{q:"श्वसन में कौन सी गैस ली जाती है?",o:["CO2","O2","N2","H2"],a:"O2"},
{q:"कार्बन डाइऑक्साइड का सूत्र क्या है?",o:["CO","CO2","O2","H2O"],a:"CO2"},
{q:"पानी का क्वथनांक क्या है?",o:["100°C","0°C","50°C","150°C"],a:"100°C"},
{q:"बल की इकाई क्या है?",o:["न्यूटन","जूल","वाट","वोल्ट"],a:"न्यूटन"},
{q:"सबसे बड़ा ग्रह कौन सा है?",o:["पृथ्वी","मंगल","बृहस्पति","शुक्र"],a:"बृहस्पति"},
{q:"जीवन की सबसे छोटी इकाई क्या है?",o:["परमाणु","कोशिका","अंग","ऊतक"],a:"कोशिका"},
{q:"पौधे भोजन कैसे बनाते हैं?",o:["श्वसन","प्रकाश संश्लेषण","पाचन","वाष्पोत्सर्जन"],a:"प्रकाश संश्लेषण"},
{q:"अम्ल लिटमस को कैसे बदलता है?",o:["नीले से लाल","लाल से नीला","कोई बदलाव नहीं","हरा"],a:"नीले से लाल"},
{q:"विद्युत धारा की इकाई क्या है?",o:["एम्पियर","वोल्ट","वाट","ओम"],a:"एम्पियर"},
{q:"प्रकाश की गति क्या है?",o:["3x10^8 m/s","1x10^6","5x10^7","None"],a:"3x10^8 m/s"},
{q:"खून का रंग किसके कारण होता है?",o:["लोहा","हीमोग्लोबिन","ऑक्सीजन","कार्बन"],a:"हीमोग्लोबिन"},
{q:"मनुष्य के शरीर में कितनी हड्डियाँ होती हैं?",o:["206","300","150","100"],a:"206"},
{q:"गुब्बारों में कौन सी गैस भरी जाती है?",o:["ऑक्सीजन","नाइट्रोजन","हीलियम","CO2"],a:"हीलियम"},
{q:"दूर की वस्तु देखने का यंत्र?",o:["सूक्ष्मदर्शी","दूरबीन","थर्मामीटर","बैरोमीटर"],a:"दूरबीन"},
{q:"शक्ति की इकाई क्या है?",o:["वाट","जूल","न्यूटन","वोल्ट"],a:"वाट"},
{q:"भोजन में ऊर्जा किस रूप में होती है?",o:["गतिज","स्थितिज","रासायनिक","ऊष्मा"],a:"रासायनिक"},
{q:"रक्त को पंप करने वाला अंग?",o:["मस्तिष्क","फेफड़े","हृदय","किडनी"],a:"हृदय"},
{q:"पृथ्वी किसके चारों ओर घूमती है?",o:["चंद्रमा","मंगल","सूर्य","शुक्र"],a:"सूर्य"}
];


let current=0,score=0,time=20,totalTime=200,timer,totalTimer;
let userAnswers=[];
let name="";

// RANDOM
questions.sort(()=>Math.random()-0.5);

function startExam(){
    name=document.getElementById("username").value;
    if(name===""){ alert("Enter name"); return; }

    document.getElementById("app").innerHTML=`
    <h3>${name}</h3>
    <div>Total Time: <span id="totalTimer"></span></div>
    <div>Question Time: <span id="qTimer"></span></div>
    <div id="progressBar"></div>
    <div id="navPanel"></div>
    <h3 id="question"></h3>
    <div id="options"></div>
    <button onclick="nextQ()">Next</button>
    <button onclick="submitExam()">Submit</button>
    `;

    loadNav();
    loadQ();
    startTimers();
}

// NAV PANEL
function loadNav(){
    let nav="";
    for(let i=0;i<questions.length;i++){
        nav+=`<button onclick="gotoQ(${i})">${i+1}</button>`;
    }
    document.getElementById("navPanel").innerHTML=nav;
}

// LOAD QUESTION
function loadQ(){
    document.getElementById("question").innerText=questions[current].q;

    let optHTML="";
    questions[current].o.forEach((op,i)=>{
        let id="o"+i;
        optHTML+=`
        <label class="option">
        <input type="radio" name="opt" value="${op}"> ${op}
        </label>`;
    });

    document.getElementById("options").innerHTML=optHTML;

    document.querySelectorAll('input[name="opt"]').forEach(inp=>{
        inp.onchange=()=> userAnswers[current]=inp.value;
    });

    document.getElementById("progressBar").style.width=(current/questions.length*100)+"%";
}

// NAVIGATION
function gotoQ(i){
    current=i;
    loadQ();
}

function nextQ(){
    current++;
    if(current<questions.length) loadQ();
}

// TIMERS
function startTimers(){
    timer=setInterval(()=>{
        time--;
        document.getElementById("qTimer").innerText=time;
        if(time<=0){ time=20; nextQ(); }
    },1000);

    totalTimer=setInterval(()=>{
        totalTime--;
        document.getElementById("totalTimer").innerText=totalTime;
        if(totalTime<=0) submitExam();
    },1000);
}

// SUBMIT
function submitExam(){
    clearInterval(timer);
    clearInterval(totalTimer);

    score=0;
    questions.forEach((q,i)=>{
        if(userAnswers[i]===q.a) score++;
    });

    let percent=(score/questions.length)*100;
    let grade= percent>80?"A":percent>50?"B":"C";

    localStorage.setItem("result",score);

    document.getElementById("app").innerHTML=`
    <h2>${name}</h2>
    <h3>Score: ${score}/${questions.length}</h3>
    <h3>Percentage: ${percent.toFixed(2)}%</h3>
    <h3>Grade: ${grade}</h3>
    <button onclick="review()">Review Answers</button>
    `;
}

// REVIEW
function review(){
    let html="<h2>Review</h2>";
    questions.forEach((q,i)=>{
        html+=`<h4>${q.q}</h4>`;
        q.o.forEach(op=>{
            let cls="";
            if(op===q.a) cls="correct";
            else if(op===userAnswers[i]) cls="wrong";
            html+=`<div class="option ${cls}">${op}</div>`;
        });
    });
    document.getElementById("app").innerHTML=html;
}

// ANTI-CHEAT
document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        alert("Tab change detected!");
    }
});
</script>

</body>
</html>
