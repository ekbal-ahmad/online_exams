<!DOCTYPE html>
<html>
<head>
<title>Pro Online Exam</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    margin: 0;
}
.container {
    width: 90%;
    max-width: 700px;
    margin: auto;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
.option {
    display: block;
    text-align: left;
    padding: 10px;
    margin: 8px 0;
    background: #f0f0f0;
    border-radius: 5px;
    cursor: pointer;
}
.option:hover { background: #ddd; }
.correct { background: lightgreen; }
.wrong { background: #ffb3b3; }
button {
    padding: 10px 15px;
    background: #667eea;
    color: white;
    border: none;
    margin: 5px;
    cursor: pointer;
}
#navPanel button { margin: 3px; padding: 5px; }
#progressBar {
    height: 8px;
    background: green;
    width: 0%;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container" id="app">
<div id="login">
    <h2>Enter Your Name</h2>
    <input type="text" id="username" placeholder="Your Name">
    <br><br>
    <button onclick="startExam()">Start Exam</button>
</div>
</div>

<script>

// 🔥 FULL 50 QUESTIONS
let questions = [
{"q":"306 और 657 का HCF क्या है?","options":["3","9","27","6"],"answer":1},
{"q":"√5 किस प्रकार की संख्या है?","options":["परिमेय","अपरिमेय","पूर्णांक","प्राकृतिक"],"answer":1},
{"q":"बहुपद x² - 5x + 6 के शून्यक क्या हैं?","options":["2,3","1,6","-2,-3","5,6"],"answer":0},
{"q":"बहुपद की घात क्या होती है?","options":["सबसे बड़ा घातांक","छोटा घातांक","स्थिर पद","कोई नहीं"],"answer":0},
{"q":"2x + 3 = 7 का हल क्या है?","options":["1","2","3","4"],"answer":1},
{"q":"x² - 4 = 0 के मूलों का स्वभाव क्या है?","options":["वास्तविक एवं भिन्न","समान","काल्पनिक","कोई नहीं"],"answer":0},
{"q":"AP: 2,4,6,... का 10वाँ पद क्या है?","options":["18","20","22","24"],"answer":1},
{"q":"पहले 5 प्राकृतिक संख्याओं का योग?","options":["10","15","20","25"],"answer":1},
{"q":"बिंदु (0,0) और (3,4) के बीच दूरी?","options":["5","6","7","4"],"answer":0},
{"q":"(2,2) और (4,4) का मध्य बिंदु?","options":["(3,3)","(2,3)","(4,3)","(3,4)"],"answer":0},

{"q":"sin 30° का मान क्या है?","options":["1","1/2","√3/2","0"],"answer":1},
{"q":"cos 60° का मान क्या है?","options":["1/2","1","0","√3/2"],"answer":0},
{"q":"tan 45° का मान क्या है?","options":["0","1","√3","∞"],"answer":1},
{"q":"sin²θ + cos²θ का मान क्या है?","options":["0","1","2","-1"],"answer":1},
{"q":"वृत्त का क्षेत्रफल क्या होता है?","options":["πr²","2πr","πd","r²"],"answer":0},
{"q":"वृत्त की परिधि क्या होती है?","options":["πr²","2πr","πd²","r"],"answer":1},
{"q":"घन का आयतन क्या होता है?","options":["a²","a³","2a","3a"],"answer":1},
{"q":"गोले का पृष्ठीय क्षेत्रफल?","options":["4πr²","2πr","πr²","r³"],"answer":0},
{"q":"2,4,6 का माध्य क्या है?","options":["4","3","5","6"],"answer":0},
{"q":"बहुलक (Mode) क्या है?","options":["औसत","अधिक बार आने वाला","मध्य मान","कोई नहीं"],"answer":1},

{"q":"LCM of 4 और 6?","options":["12","24","6","18"],"answer":0},
{"q":"√9 = ?","options":["2","3","4","1"],"answer":1},
{"q":"x² - 9 का गुणनखंड?","options":["(x-3)(x+3)","(x-1)(x+9)","(x-9)","कोई नहीं"],"answer":0},
{"q":"रेखीय समीकरण का ग्राफ?","options":["सीधी रेखा","वृत्त","पराबोला","दीर्घवृत्त"],"answer":0},
{"q":"त्रिभुज के कोणों का योग?","options":["90°","180°","360°","270°"],"answer":1},
{"q":"पाइथागोरस प्रमेय?","options":["a²+b²=c²","a+b=c","a²-b²=c²","कोई नहीं"],"answer":0},
{"q":"ढाल (Slope) का सूत्र?","options":["(y2-y1)/(x2-x1)","x+y","x-y","कोई नहीं"],"answer":0},
{"q":"sin 90° का मान?","options":["0","1","-1","∞"],"answer":1},
{"q":"cos 0° का मान?","options":["0","1","-1","∞"],"answer":1},
{"q":"tan 0° का मान?","options":["0","1","∞","-1"],"answer":0},

{"q":"त्रिभुज में भुजाओं की संख्या?","options":["3","4","5","6"],"answer":0},
{"q":"समांतर रेखाएँ कब मिलती हैं?","options":["कभी नहीं","हमेशा","कभी-कभी","कोई नहीं"],"answer":0},
{"q":"अर्धवृत्त में कोण?","options":["90°","180°","60°","45°"],"answer":0},
{"q":"वर्ग का परिमाप?","options":["4a","a²","2a","a³"],"answer":0},
{"q":"वर्ग का विकर्ण?","options":["a√2","a²","2a","a"],"answer":0},
{"q":"समकोण कितना?","options":["90°","180°","60°","45°"],"answer":0},
{"q":"पूर्ण कोण?","options":["360°","180°","90°","270°"],"answer":0},
{"q":"सरल ब्याज सूत्र?","options":["P×R×T/100","P+R+T","PRT","कोई नहीं"],"answer":0},
{"q":"प्रायिकता की सीमा?","options":["0 से 1","1 से 10","-1 से 1","0 से 10"],"answer":0},
{"q":"माध्य क्या है?","options":["औसत","मध्य","बहुलक","कोई नहीं"],"answer":0},

{"q":"सम संख्या उदाहरण?","options":["2","3","5","7"],"answer":0},
{"q":"अभाज्य संख्या?","options":["2","4","6","8"],"answer":0},
{"q":"0 क्या है?","options":["सम","विषम","अभाज्य","कोई नहीं"],"answer":0},
{"q":"90° से बड़ा कोण?","options":["स्थूल","तीक्ष्ण","समकोण","सीधा"],"answer":0},
{"q":"सीधा कोण?","options":["180°","90°","360°","60°"],"answer":0}
];

let current=0,score=0,time=30,totalTime=1500;
let timer,totalTimer;
let userAnswers=[];
let name="";

questions.sort(()=>Math.random()-0.5);

function startExam(){
    name=document.getElementById("username").value;
    if(name===""){ alert("Enter name"); return; }

    document.getElementById("app").innerHTML=`
    <h3>${name}</h3>
    <div>Total Time: <span id="totalTimer"></span></div>
    <div>Question Time: <span id="qTimer"></span></div>
    <div id="progressBar"></div>
    <div id="navPanel"></div>
    <h3 id="question"></h3>
    <div id="options"></div>
    <button onclick="nextQ()">Next</button>
    <button onclick="submitExam(false)" id="submitBtn" disabled>Submit</button>
    `;

    loadNav();
    loadQ();
    startTimers();
}

function loadNav(){
    let nav="";
    for(let i=0;i<questions.length;i++){
        nav+=`<button onclick="gotoQ(${i})">${i+1}</button>`;
    }
    document.getElementById("navPanel").innerHTML=nav;
}

function loadQ(){
    document.getElementById("question").innerText=questions[current].q;

    let optHTML="";
    questions[current].options.forEach((op,i)=>{
        let checked = userAnswers[current]===i ? "checked":"";
        optHTML+=`
        <label class="option">
        <input type="radio" name="opt" value="${i}" ${checked}> ${op}
        </label>`;
    });

    document.getElementById("options").innerHTML=optHTML;

    document.querySelectorAll('input[name="opt"]').forEach(inp=>{
        inp.onchange=()=>{
            userAnswers[current]=parseInt(inp.value);
            checkAllAnswered();
        };
    });

    document.getElementById("progressBar").style.width=((current+1)/questions.length*100)+"%";
}

function gotoQ(i){ current=i; loadQ(); }
function nextQ(){ if(current<questions.length-1){ current++; loadQ(); } }

function checkAllAnswered(){
    let allAnswered = userAnswers.length === questions.length 
        && userAnswers.every(ans => ans !== undefined);
    document.getElementById("submitBtn").disabled = !allAnswered;
}

function startTimers(){
    timer=setInterval(()=>{
        time--;
        document.getElementById("qTimer").innerText=time;
        if(time<=0){ time=30; nextQ(); }
    },1000);

    totalTimer=setInterval(()=>{
        totalTime--;
        document.getElementById("totalTimer").innerText=totalTime;
        if(totalTime<=0) submitExam(true);
    },1000);
}

function submitExam(auto=false){

    if(!auto){
        let allAnswered = userAnswers.length === questions.length 
            && userAnswers.every(ans => ans !== undefined);
        if(!allAnswered){
            alert("सभी प्रश्नों का उत्तर दें!");
            return;
        }
    }

    clearInterval(timer);
    clearInterval(totalTimer);

    score=0;
    questions.forEach((q,i)=>{
        if(userAnswers[i]===q.answer) score++;
    });

    let percent=(score/questions.length)*100;
    let grade= percent>80?"A":percent>50?"B":"C";

    document.getElementById("app").innerHTML=`
    <h2>${name}</h2>
    <h3>Score: ${score}/${questions.length}</h3>
    <h3>Percentage: ${percent.toFixed(2)}%</h3>
    <h3>Grade: ${grade}</h3>
    <button onclick="review()">Review Answers</button>
    `;
}

function review(){
    let html="<h2>Review (Attempted Only)</h2>";

    questions.forEach((q,i)=>{
        if(userAnswers[i] === undefined) return;

        html+=`<h4>${q.q}</h4>`;

        q.options.forEach((op,index)=>{
            let cls="";
            if(index===q.answer) cls="correct";
            else if(index===userAnswers[i]) cls="wrong";

            html+=`<div class="option ${cls}">${op}</div>`;
        });
    });

    document.getElementById("app").innerHTML=html;
}

document.addEventListener("visibilitychange",()=>{
    if(document.hidden){
        alert("Tab change detected!");
    }
});

</script>

</body>
</html>
